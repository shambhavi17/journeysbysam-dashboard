name: Refresh dashboard

# Runs weekly (Monday) and can also be triggered by hand from the
# Actions tab -> "Refresh dashboard" -> "Run workflow".
on:
  schedule:
    - cron: "0 13 * * 1"      # every Monday 13:00 UTC (~7am US Central)
  workflow_dispatch: {}

permissions:
  contents: write              # lets the job push the rebuilt dashboard

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openpyxl

      - name: Pull fresh Instagram data + rebuild dashboard
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python3 refresh_data.py

      - name: Publish as index.html
        run: cp content_analytics_dashboard.html index.html

      - name: Commit & push if the dashboard changed
        run: |
          git config user.name "journeysbysam-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html data
          if git diff --staged --quiet; then
            echo "No changes — dashboard already up to date."
          else
            git commit -m "Auto-refresh dashboard data"
            git push
          fi
